baseURL = "https://larkinlabs.net/"
locale = "en-us"
title = "Larkin Labs"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pagination.pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Notes on coding, tools, and side projects."
  author = "Jake Larkin"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowToc = false
  disableSpecial1stPost = false
  comments = false

  [params.homeInfoParams]
    Title = "Larkin Labs"
    Content = "Notes on coding, tools, and side projects."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jakelarkn"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.assets]
    disableHLJS = true
    favicon = "/favicon.ico"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "github-dark"
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40
